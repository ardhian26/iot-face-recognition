<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Login | VisionGuard IoT</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full font-sans antialiased text-slate-900 bg-white">

<main class="flex min-h-full items-center justify-center p-6 sm:p-12">
  <section class="w-full max-w-[440px] rounded-3xl p-8 sm:p-12 border border-slate-200 shadow-xl bg-white">
    
    <!-- Logo -->
    <div class="flex flex-col items-center mb-10">
      <div class="w-32 h-32 mb-4 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="w-full h-full drop-shadow-lg">
          <!-- Shield -->
          <path d="M50 5 L90 20 L90 55 C90 75 70 92 50 98 C30 92 10 75 10 55 L10 20 Z" 
                fill="none" stroke="#0891b2" stroke-width="3"/>
          <path d="M50 10 L85 23 L85 55 C85 73 67 89 50 95 C33 89 15 73 15 55 L15 23 Z" 
                fill="rgba(8,145,178,0.08)"/>
          <!-- Eye -->
          <ellipse cx="50" cy="52" rx="18" ry="12" fill="none" stroke="#0891b2" stroke-width="2.5"/>
          <circle cx="50" cy="52" r="7" fill="#0891b2"/>
          <circle cx="50" cy="52" r="3.5" fill="white"/>
          <circle cx="47" cy="49" r="1.5" fill="white" opacity="0.8"/>
          <!-- Circuit lines -->
          <line x1="32" y1="52" x2="20" y2="52" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="3,2"/>
          <line x1="68" y1="52" x2="80" y2="52" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="3,2"/>
          <line x1="50" y1="40" x2="50" y2="30" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="3,2"/>
          <circle cx="20" cy="52" r="2" fill="#0ea5e9"/>
          <circle cx="80" cy="52" r="2" fill="#0ea5e9"/>
          <circle cx="50" cy="30" r="2" fill="#0ea5e9"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-800">VisionGuard IoT</h1>
      <p class="text-sm text-slate-500 mt-1">Sistem Absensi Wajah</p>
    </div>

    <!-- Title -->
    <div class="mb-8 text-center">
      <h2 class="text-xl font-bold text-slate-800">Selamat Datang</h2>
      <p class="text-sm text-slate-500 mt-1">Masukkan detail akun Anda untuk masuk</p>
    </div>

    <!-- Form -->
    <form method="POST" action="{% url 'login' %}" class="space-y-5">
      {% csrf_token %}

      {% if form.errors %}
      <div class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl px-4 py-3">
        Username atau password salah. Coba lagi.
      </div>
      {% endif %}

      <!-- Username -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="id_username">
          Username
        </label>
        <input 
          type="text" 
          name="username" 
          id="id_username"
          placeholder="Masukkan username"
          class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition"
          required
        />
      </div>

      <!-- Password -->
      <div>
        <div class="flex items-center justify-between mb-1.5">
          <label class="block text-sm font-semibold text-slate-700" for="id_password">
            Password
          </label>
        </div>
        <input 
          type="password" 
          name="password" 
          id="id_password"
          placeholder="••••••••"
          class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition"
          required
        />
      </div>

      <!-- Remember Me -->
      <div class="flex items-center">
        <input 
          type="checkbox" 
          id="remember-me" 
          name="remember-me"
          class="h-4 w-4 rounded border-slate-300 text-cyan-600 focus:ring-cyan-500 cursor-pointer"
        />
        <label class="ml-3 text-sm text-slate-600 cursor-pointer" for="remember-me">
          Ingat saya selama 30 hari
        </label>
      </div>

      <!-- Submit -->
      <div class="pt-2">
        <button 
          type="submit"
          class="w-full rounded-xl bg-gradient-to-r from-cyan-600 to-blue-600 px-4 py-3.5 text-sm font-bold text-white shadow-lg hover:from-cyan-500 hover:to-blue-500 transition-all active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-cyan-500"
        >
          Masuk ke Akun
        </button>
      </div>
    </form>

  </section>
</main>

<!-- Footer -->
<footer class="fixed bottom-6 w-full text-center">
  <p class="text-xs text-slate-400 tracking-widest uppercase">
    © 2025 VisionGuard IoT. Sistem Absensi Wajah.
  </p>
</footer>

</body>
</html>
